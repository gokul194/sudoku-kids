<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="40" fill="#6C63FF"/>
  <rect x="28" y="28" width="136" height="136" rx="16" fill="white" opacity="0.15"/>
  <!-- 4x4 grid lines -->
  <g stroke="white" stroke-width="3" opacity="0.6">
    <line x1="62" y1="44" x2="62" y2="148"/>
    <line x1="96" y1="44" x2="96" y2="148"/>
    <line x1="130" y1="44" x2="130" y2="148"/>
    <line x1="44" y1="62" x2="148" y2="62"/>
    <line x1="44" y1="96" x2="148" y2="96"/>
    <line x1="44" y1="130" x2="148" y2="130"/>
  </g>
  <!-- Bold box dividers -->
  <g stroke="white" stroke-width="5">
    <line x1="96" y1="44" x2="96" y2="148"/>
    <line x1="44" y1="96" x2="148" y2="96"/>
  </g>
  <!-- Outer border -->
  <rect x="44" y="44" width="104" height="104" rx="8" fill="none" stroke="white" stroke-width="5"/>
  <!-- Sample numbers -->
  <g fill="white" font-family="Arial,sans-serif" font-weight="900" font-size="22" text-anchor="middle">
    <text x="62" y="85">2</text>
    <text x="130" y="85">4</text>
    <text x="96" y="119">3</text>
  </g>
  <!-- Puzzle piece emoji style -->
  <text x="96" y="175" font-size="14" fill="white" text-anchor="middle" font-family="Arial" font-weight="700" opacity="0.8">SUDOKU</text>
</svg>
